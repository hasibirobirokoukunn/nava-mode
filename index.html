<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavaMode</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8f9ff, #dce6ff);
            font-family: Arial, sans-serif;
        }

        .app {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 42px;
        }

        p {
            color: gray;
            font-size: 20px;
        }

        input {
            width: 300px;
            padding: 15px;
            margin-top: 20px;
            border-radius: 15px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app">
        <h1>NavaMode</h1>
        <p>今なにしてる？</p>

        <input type="text" placeholder="ゲーム中、勉強中...">
        <br>

        <button>投稿</button>
    </div>

</body>
</html>
