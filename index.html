<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NAVA MODE</title>
<style>
  body {
    font-family: sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding: 30px;
  }

  .box {
    max-width: 500px;
    margin: auto;
    padding: 20px;
    background: #1c1c1c;
    border-radius: 12px;
  }

  textarea {
    width: 100%;
    height: 100px;
    margin-top: 10px;
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    cursor: pointer;
  }

  .small {
    font-size: 12px;
    color: gray;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="box">
  <h1>NAVA MODE</h1>
  <p id="question">読み込み中...</p>

  <textarea id="answer" placeholder="今日の答えを書く..."></textarea>
  <br>
  <button onclick="saveAnswer()">送信</button>

  <p class="small" id="status"></p>
</div>

<script>
const questions = [
  "今日の気分を一言で",
  "最近ハマってることは？",
  "今何してる？",
  "今日一番楽しかったことは？",
  "今食べたいものは？",
  "最近ムカついたことは？",
  "明日やりたいことは？",
  "人生で今大事なことは？",
  "今日の自分を点数で言うと？",
  "今のテンションは？"
];

// 今日の日付取得
function getDateKey() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

// 今日の質問決定（固定化）
function getTodayQuestion() {
  const key = "nava_question_" + getDateKey();
  let q = localStorage.getItem(key);

  if (!q) {
    q = questions[Math.floor(Math.random() * questions.length)];
    localStorage.setItem(key, q);
  }

  return q;
}

// 回答保存
function saveAnswer() {
  const text = document.getElementById("answer").value;
  if (!text) return;

  const key = "nava_answer_" + getDateKey();
  localStorage.setItem(key, text);

  document.getElementById("status").innerText = "保存したよ";
}

// 初期表示
const todayQ = getTodayQuestion();
document.getElementById("question").innerText = todayQ;

// 既存回答表示
const saved = localStorage.getItem("nava_answer_" + getDateKey());
if (saved) {
  document.getElementById("answer").value = saved;
  document.getElementById("status").innerText = "今日の回答あり";
}
</script>

</body>
</html>
