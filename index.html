<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NAVA MODE</title>

<style>
body {
  font-family: sans-serif;
  background: #0f0f0f;
  color: white;
  text-align: center;
  padding: 30px;
}

.box {
  max-width: 500px;
  margin: auto;
  padding: 20px;
  background: #1c1c1c;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 100px;
  margin-top: 10px;
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h1>NAVA MODE</h1>

  <p id="streak">🔥 ストリーク: 0日</p>
  <p id="question">読み込み中...</p>

  <textarea id="answer" placeholder="今日の答えを書く"></textarea>
  <br>
  <button onclick="saveAnswer()">送信</button>

  <p id="status"></p>
</div>

<script>
// ===== 質問 =====
const questions = [
  "今日の気分を一言で",
  "最近ハマってることは？",
  "今何してる？",
  "今日一番楽しかったことは？",
  "今食べたいものは？",
  "明日やりたいことは？"
];

// ===== 日付 =====
function getDateKey() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

function getYesterdayKey() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

// ===== 今日の質問固定 =====
function getTodayQuestion() {
  const key = "nava_q_" + getDateKey();
  let q = localStorage.getItem(key);

  if (!q) {
    q = questions[Math.floor(Math.random() * questions.length)];
    localStorage.setItem(key, q);
  }

  return q;
}

// ===== ストリーク =====
function getStreak() {
  return parseInt(localStorage.getItem("nava_streak") || "0");
}

function updateStreak() {
  const today = getDateKey();
  const yesterday = getYesterdayKey();
  const lastDate = localStorage.getItem("nava_last_date");

  let streak = getStreak();

  if (lastDate === yesterday) {
    streak += 1;
  } else if (lastDate !== today) {
    streak = 1;
  }

  localStorage.setItem("nava_streak", streak);
  localStorage.setItem("nava_last_date", today);

  document.getElementById("streak").innerText = "🔥 ストリーク: " + streak + "日";
}

// ===== 保存 =====
function saveAnswer() {
  const text = document.getElementById("answer").value;
  if (!text) return;

  localStorage.setItem("nava_a_" + getDateKey(), text);

  updateStreak();

  document.getElementById("status").innerText = "保存したよ";
}

// ===== 初期化 =====
document.getElementById("question").innerText = getTodayQuestion();

const saved = localStorage.getItem("nava_a_" + getDateKey());
if (saved) {
  document.getElementById("answer").value = saved;
  document.getElementById("status").innerText = "今日の回答あり";
}

// ストリーク表示
document.getElementById("streak").innerText =
  "🔥 ストリーク: " + getStreak() + "日";
</script>

</body>
</html>
